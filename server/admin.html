<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>贷款利率核算 · 后台管理</title>
  <style>
    :root {
      --bg: #0f1119;
      --card: #1a1d2e;
      --border: #2a2d3e;
      --text: #e2e4e9;
      --text2: #8b8fa3;
      --accent: #6366f1;
      --accent2: #06b6d4;
      --red: #ef4444;
      --amber: #f59e0b;
      --green: #10b981;
      --radius: 12px;
      --radius-sm: 8px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }
    /* ─── header ─── */
    .header {
      background: linear-gradient(135deg, #6366f1 0%, #06b6d4 100%);
      padding: 28px 32px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header h1 { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
    .header .live { font-size: 13px; color: rgba(255,255,255,0.75); }
    .header .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      background: #10b981; margin-right: 6px; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* ─── stats ─── */
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; padding: 24px 32px; }
    .stat-card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 20px; position: relative; overflow: hidden;
    }
    .stat-card::before {
      content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
    }
    .stat-card:nth-child(1)::before { background: var(--accent); }
    .stat-card:nth-child(2)::before { background: var(--accent2); }
    .stat-card:nth-child(3)::before { background: var(--amber); }
    .stat-card:nth-child(4)::before { background: var(--red); }
    .stat-value { font-size: 32px; font-weight: 800; display: block; }
    .stat-label { font-size: 13px; color: var(--text2); margin-top: 2px; }

    /* ─── toolbar ─── */
    .toolbar { display: flex; gap: 12px; padding: 0 32px 16px; align-items: center; flex-wrap: wrap; }
    .search { flex: 1; min-width: 200px; max-width: 320px;
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 10px 16px; color: var(--text); font-size: 14px; outline: none; transition: 0.2s; }
    .search:focus { border-color: var(--accent); }
    .search::placeholder { color: var(--text2); }
    .btn {
      padding: 10px 18px; border-radius: var(--radius-sm); border: 1px solid var(--border);
      background: var(--card); color: var(--text); cursor: pointer; font-size: 13px;
      font-weight: 600; transition: 0.15s; white-space: nowrap;
    }
    .btn:hover { background: #252840; border-color: var(--accent); }
    .btn-danger { color: var(--red); border-color: rgba(239,68,68,0.3); }
    .btn-danger:hover { background: rgba(239,68,68,0.1); }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-primary:hover { background: #5558e6; }
    .btn-export { color: var(--green); border-color: rgba(16,185,129,0.3); }
    .btn-export:hover { background: rgba(16,185,129,0.1); }

    /* ─── table ─── */
    .table-wrap { padding: 0 32px 32px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      text-align: left; padding: 12px 14px; font-size: 12px; font-weight: 600;
      color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border); white-space: nowrap; position: sticky; top: 0;
      background: var(--bg); z-index: 1;
    }
    tbody td {
      padding: 12px 14px; border-bottom: 1px solid rgba(42,45,62,0.5);
      white-space: nowrap; vertical-align: middle;
    }
    tbody tr { transition: background 0.15s; }
    tbody tr:hover { background: rgba(99,102,241,0.06); }
    .mono { font-family: 'SF Mono', 'Menlo', 'Consolas', monospace; font-size: 12px; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .badge-reverse { background: rgba(99,102,241,0.15); color: #a5b4fc; }
    .badge-forward { background: rgba(6,182,212,0.15); color: #67e8f9; }
    .badge-flow { background: rgba(16,185,129,0.15); color: #6ee7b7; }
    .badge-high { background: rgba(239,68,68,0.15); color: #fca5a5; }
    .badge-mid { background: rgba(245,158,11,0.15); color: #fcd34d; }
    .badge-good { background: rgba(16,185,129,0.15); color: #6ee7b7; }
    .badge-over { background: rgba(239,68,68,0.1); color: var(--red); }
    .badge-ok { background: rgba(16,185,129,0.1); color: var(--green); }
    .delete-btn { cursor: pointer; color: var(--red); font-size: 18px; line-height: 1; opacity: 0.5; transition: 0.15s; }
    .delete-btn:hover { opacity: 1; }

    /* ─── empty ─── */
    .empty { text-align: center; padding: 60px; color: var(--text2); }
    .empty svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: 0.3; }
    .empty p { font-size: 14px; }

    /* ─── toast ─── */
    .toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 600; z-index: 99; animation: slideIn 0.3s ease;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    .toast-success { background: #065f46; color: #6ee7b7; }
    .toast-error { background: #7f1d1d; color: #fca5a5; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

    /* ─── modal ─── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center; z-index: 100;
      backdrop-filter: blur(4px); }
    .modal-box { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 28px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
    .modal-box h3 { font-size: 18px; margin-bottom: 16px; }
    .modal-box .row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; border-bottom: 1px solid rgba(42,45,62,0.3); }
    .modal-box .row .key { color: var(--text2); }
    .modal-box .actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
    .modal-box .close-btn { color: var(--text); cursor: pointer; font-size: 20px; float: right; opacity: 0.5; }
    .modal-box .close-btn:hover { opacity: 1; }

    @media (max-width: 768px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .header, .stats, .toolbar, .table-wrap { padding-left: 16px; padding-right: 16px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>贷款利率核算</h1>
      <div class="live"><span class="dot"></span>数据实时同步</div>
    </div>
    <div>
      <button class="btn btn-export" onclick="exportCSV()">导出 CSV</button>
      <button class="btn btn-primary" onclick="location.reload()" style="margin-left:8px;">刷新</button>
    </div>
  </div>

  <div class="stats" id="stats"></div>
  <div class="toolbar">
    <input class="search" type="text" id="search" placeholder="搜索本金 / 利率 / 还款方式..." oninput="renderTable()">
    <select class="btn" id="filterMode" onchange="renderTable()">
      <option value="">全部模式</option>
      <option value="reverse">反推利率</option>
      <option value="forward">正向计算</option>
      <option value="flow">流水分析</option>
    </select>
    <button class="btn btn-danger" onclick="clearAll()">清空数据</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>时间</th>
          <th>本金</th>
          <th>期数</th>
          <th>还款方式</th>
          <th>模式</th>
          <th>年化利率</th>
          <th>总还款</th>
          <th>总利息</th>
          <th>判定</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty" id="empty" style="display:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
      </svg>
      <p>暂无数据</p>
    </div>
  </div>

  <div id="toast" style="display:none;"></div>
  <div id="modal" style="display:none;"></div>

  <script>
    const API = '/api/records';
    let allRecords = [];

    function fmt(v, d=2) { return Number(v).toLocaleString('zh-CN', { minimumFractionDigits: d, maximumFractionDigits: d }); }
    function fmtPct(v) { return (v*100).toFixed(2)+'%'; }
    function fmtDate(s) { return s ? s.slice(0,16).replace('T',' ') : '-'; }
    function modeLabel(m) { return { reverse: '反推利率', forward: '正向计算', flow: '流水分析' }[m] || m; }
    function repayLabel(t) { return { 'equal-installment': '等额本息', 'equal-principal': '等额本金', 'interest-first': '先息后本' }[t] || t; }

    async function load() {
      try {
        const res = await fetch(API);
        const json = await res.json();
        if (json.success) {
          allRecords = json.data;
        } else {
          allRecords = [];
        }
      } catch (e) {
        allRecords = [];
        toast('无法连接 API 服务', 'error');
      }
      renderStats();
      renderTable();
    }

    function renderStats() {
      const n = allRecords.length;
      const avgApr = n > 0 ? allRecords.reduce((s,r) => s + r.annualAPR, 0) / n : 0;
      const maxApr = n > 0 ? Math.max(...allRecords.map(r => r.annualAPR)) : 0;
      const overCount = allRecords.filter(r => r.isOvercharged === true).length;
      document.getElementById('stats').innerHTML = `
        <div class="stat-card"><span class="stat-value">${n}</span><span class="stat-label">总记录数</span></div>
        <div class="stat-card"><span class="stat-value">${fmtPct(avgApr)}</span><span class="stat-label">平均年化</span></div>
        <div class="stat-card"><span class="stat-value">${fmtPct(maxApr)}</span><span class="stat-label">最高年化</span></div>
        <div class="stat-card"><span class="stat-value">${overCount}</span><span class="stat-label">多收费异常</span></div>
      `;
    }

    function renderTable() {
      const q = document.getElementById('search').value.toLowerCase();
      const fm = document.getElementById('filterMode').value;
      let list = allRecords;
      if (fm) list = list.filter(r => r.calcMode === fm);
      if (q) list = list.filter(r =>
        String(r.principal).includes(q) ||
        r.annualAPR.toFixed(4).includes(q.replace('%','')) ||
        repayLabel(r.repayType).includes(q) ||
        modeLabel(r.calcMode).includes(q)
      );
      document.getElementById('empty').style.display = list.length ? 'none' : '';
      document.getElementById('tbody').innerHTML = list.map(r => {
        const aprTag = r.annualAPR > 0.24 ? 'badge-high' : r.annualAPR > 0.15 ? 'badge-mid' : 'badge-good';
        const verdict = r.isOvercharged === true
          ? '<span class="badge badge-over">多收费</span>'
          : r.isOvercharged === false
            ? '<span class="badge badge-ok">正常</span>'
            : '<span class="badge">—</span>';
        return `<tr>
          <td class="mono">${fmtDate(r.createdAt)}</td>
          <td>¥${fmt(r.principal, 0)}</td>
          <td>${r.months || '-'}期</td>
          <td>${repayLabel(r.repayType)}</td>
          <td><span class="badge badge-reverse">${modeLabel(r.calcMode)}</span></td>
          <td><span class="badge ${aprTag}">${fmtPct(r.annualAPR)}</span></td>
          <td>¥${fmt(r.totalPayment, 0)}</td>
          <td>¥${fmt(r.totalInterest, 0)}</td>
          <td>${verdict}</td>
          <td>
            <span class="delete-btn" onclick="delRecord('${r.id}')" title="删除">×</span>
          </td>
        </tr>`;
      }).join('');
    }

    async function delRecord(id) {
      if (!confirm('确认删除这条记录？')) return;
      try {
        await fetch(API + '/' + encodeURIComponent(id), { method: 'DELETE' });
        allRecords = allRecords.filter(r => r.id !== id);
        renderStats(); renderTable();
        toast('已删除');
      } catch (e) {
        toast('删除失败', 'error');
      }
    }

    async function clearAll() {
      if (!confirm('确认清空全部数据？此操作不可恢复！')) return;
      try {
        await fetch(API, { method: 'DELETE' });
        allRecords = [];
        renderStats(); renderTable();
        toast('已清空全部数据');
      } catch (e) {
        toast('清空失败', 'error');
      }
    }

    function exportCSV() {
      if (!allRecords.length) return toast('暂无数据可导出', 'error');
      const header = '时间,本金,期数,还款方式,计算模式,年化利率,总还款,总利息,总费用,多收费,多收金额\n';
      const rows = allRecords.map(r => [
        fmtDate(r.createdAt),
        r.principal,
        r.months,
        repayLabel(r.repayType),
        modeLabel(r.calcMode),
        fmtPct(r.annualAPR),
        r.totalPayment,
        r.totalInterest,
        r.totalFee,
        r.isOvercharged === true ? '是' : r.isOvercharged === false ? '否' : '-',
        r.overchargeAmount || 0,
      ].join(','));
      const blob = new Blob(['\uFEFF'+header+rows.join('\n')], { type: 'text/csv;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'loan_records_' + new Date().toISOString().slice(0,10) + '.csv';
      a.click();
      toast('导出成功');
    }

    function toast(msg, type='success') {
      const el = document.getElementById('toast');
      el.textContent = msg; el.className = 'toast toast-' + type; el.style.display = '';
      clearTimeout(el._t); el._t = setTimeout(() => el.style.display = 'none', 2500);
    }

    load();
  </script>
</body>
</html>
