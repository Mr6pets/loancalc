<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="fg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- 背景圆 -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- 内圈渐变环 -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#fg)" stroke-width="12" stroke-opacity="0.3"/>
  <circle cx="256" cy="256" r="140" fill="none" stroke="url(#fg)" stroke-width="8" stroke-dasharray="200 400" stroke-linecap="round"/>
  <!-- % 符号 -->
  <text x="256" y="220" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="120" font-weight="800" fill="#ffffff" text-anchor="middle">%</text>
  <!-- 标签 -->
  <text x="256" y="320" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="48" font-weight="600" fill="#22d3ee" text-anchor="middle">IRR</text>
</svg>
