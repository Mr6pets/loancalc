# ============================================================
# LoanCalc Docker 编排
# 域名: loancalc.guluwater.com
# 启动: docker compose up -d
# 停止: docker compose down
# 查看日志: docker compose logs -f
# 重启: docker compose restart
# ============================================================

version: "3.8"

services:
  # ─── Node.js 后端 API ───
  loancalc-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: loancalc-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3002"  # 仅监听本地，由 Nginx 反向代理
    volumes:
      - loancalc_data:/app/data        # SQLite 数据库持久化
      # 如需使用 .env 配置环境变量，取消下行注释：
      # - ./.env:/app/.env:ro
    environment:
      - NODE_ENV=production
      - PORT=3002
      # 可选：MySQL 模式（取消注释并填入实际值）
      # - DB_HOST=127.0.0.1
      # - DB_PORT=3306
      # - DB_USER=root
      # - DB_PASSWORD=your_password
      # - DB_NAME=loan_calc
    networks:
      - loancalc_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  loancalc_data:
    name: loancalc_data

networks:
  loancalc_net:
    name: loancalc_net
